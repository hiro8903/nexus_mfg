<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusMfg - ログイン</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .card {
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #f1f5f9;
        }
        .bg-pattern {
            background-color: #f8fafc;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#e6f4fc',  /* Slightly more distinct pale blue for row hovers */
                            100: '#c7e6fd',
                            200: '#a3d9fd',
                            300: '#8ed1fc', /* User's light */
                            400: '#28a6f5',
                            500: '#0b9bf0',
                            600: '#0693e3', /* User's base */
                            700: '#0472b5', /* Deeper, distinct hover color */
                            800: '#03558a',
                            900: '#023a63',
                        }
                    }
                }
            }
        }
    </script>
</head>


<body class="bg-pattern min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md">
        <!-- ロゴエリア -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-brand-600 rounded-2xl flex items-center justify-center shadow-lg shadow-brand-200 mx-auto mb-4">
                <span class="text-white font-bold text-3xl">N</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-slate-900">NexusMfg</h1>
            <p class="text-slate-500 mt-2 font-medium">統合製造管理システム</p>
        </div>

        <!-- ログインカード -->
        <div class="card rounded-3xl p-8">
            <form class="space-y-6">
                <div>
                    <label for="user_code" class="block text-sm font-bold text-slate-700 mb-2">ユーザーコード</label>
                    <input type="text" id="user_code" placeholder="例: EMP-001" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all">
                </div>

                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label for="password" class="block text-sm font-bold text-slate-700">パスワード</label>
                        <a href="#" class="text-sm font-bold text-brand-600 hover:text-brand-700 hover:underline">お忘れですか？</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 transition-all">
                </div>

                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" id="remember" class="w-5 h-5 rounded border-slate-300 text-brand-600 focus:ring-brand-500/20 cursor-pointer">
                    <label for="remember" class="text-sm font-medium text-slate-600 cursor-pointer">ログイン状態を保持する</label>
                </div>

                <div class="pt-2">
                    <button type="button" class="w-full bg-brand-600 text-white rounded-xl py-3.5 text-sm font-bold shadow-lg shadow-brand-100 hover:bg-brand-700 hover:-translate-y-0.5 transition-all">
                        システムにログイン
                    </button>
                </div>
            </form>
        </div>

        <!-- フッター -->
        <div class="text-center mt-8 text-sm text-slate-400 font-medium">
            <p>&copy; 2026 NexusMfg. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
